<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscritos</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #eef2f7;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: left;
}

th {
  background: #007bff;
  color: white;
}

.duplicate {
  background: #ffe5e5;
}

.btn {
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.btn-view {
  background: #17a2b8;
  color: white;
}

.btn-delete {
  background: #dc3545;
  color: white;
}

.top-actions {
  display: flex;
  gap: 10px;
}

.back {
  cursor: pointer;
  color: #007bff;
  margin-bottom: 10px;
}

</style>
</head>

<body>

<div class="container">

<div class="back" onclick="volver()">⬅ Volver</div>

<h1>👥 Gestión de Inscritos</h1>

<div class="card">

<div class="top-actions">
  <select id="sedeSelect">
    <option value="">Todas las sedes</option>
  </select>

  <input type="text" id="buscador" placeholder="Buscar nombre...">
</div>

</div>

<div class="card">

<table>
<thead>
<tr>
  <th>Nombre</th>
  <th>Sede</th>
  <th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

</div>

<script>

const URL = "https://opensheet.elk.sh/1KnqBvdR7gnt2EO22AQbQcYiUYLMBpnFE28XrBPMYBsU/Solicitud";

let datos = [];

async function cargarDatos() {
  const res = await fetch(URL);
  datos = await res.json();

  const sedes = [...new Set(datos.map(d => d["Asistencia"]))];

  const select = document.getElementById("sedeSelect");

  sedes.forEach(s => {
    if (s) {
      let option = document.createElement("option");
      option.value = s;
      option.textContent = s;
      select.appendChild(option);
    }
  });

  render();
}

function render() {
  const sede = document.getElementById("sedeSelect").value;
  const texto = document.getElementById("buscador").value.toLowerCase();

  let filtrados = datos;

  if (sede) {
    filtrados = filtrados.filter(d => d["Asistencia"] === sede);
  }

  if (texto) {
    filtrados = filtrados.filter(d =>
      (d["Nombre Completo"] || "").toLowerCase().includes(texto)
    );
  }

  // detectar duplicados
  let contador = {};
  filtrados.forEach(d => {
    let nombre = d["Nombre Completo"];
    contador[nombre] = (contador[nombre] || 0) + 1;
  });

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  filtrados.forEach(d => {
    const nombre = d["Nombre Completo"] || "Sin nombre";
    const sede = d["Asistencia"] || "-";

    const esDuplicado = contador[nombre] > 1;

    tabla.innerHTML += `
      <tr class="${esDuplicado ? 'duplicate' : ''}">
        <td>${nombre}</td>
        <td>${sede}</td>
        <td>
          <button class="btn btn-view" onclick="ver('${nombre}')">Ver</button>
          <button class="btn btn-delete" onclick="eliminar('${nombre}')">Eliminar</button>
        </td>
      </tr>
    `;
  });
}

function ver(nombre) {
  alert("Detalle de: " + nombre);
}

function eliminar(nombre) {
  alert("⚠️ Aquí conectarías con Apps Script para eliminar:\n" + nombre);
}

document.getElementById("sedeSelect").addEventListener("change", render);
document.getElementById("buscador").addEventListener("input", render);

function volver() {
  window.location.href = "index.html";
}

cargarDatos();

</script>

</body>
</html>
