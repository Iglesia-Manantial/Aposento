<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscritos - Visión</title>

<link rel="icon" href="data:,">

<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #eef2f7;
    margin: 0;
    color: #333;
  }

  .container {
    max-width: 1100px;
    margin: auto;
    padding: 15px;
  }

  h1 {
    text-align: center;
    color: #2c3e50;
  }

  .card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  }

  .filters {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  input, select {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    width: 100%;
    box-sizing: border-box;
    outline: none;
  }

  input:focus, select:focus {
    border-color: #007bff;
  }

  .table-container {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 700px;
  }

  th, td {
    padding: 12px;
    border-bottom: 1px solid #eee;
    font-size: 14px;
    text-align: left;
  }

  th {
    background: #007bff;
    color: white;
    position: sticky;
    top: 0;
  }

  .card-item {
    display: none;
  }

  .back {
    cursor: pointer;
    color: #007bff;
    margin-bottom: 15px;
    display: inline-block;
    font-weight: bold;
  }

  .mensaje {
    text-align: center;
    padding: 40px;
    color: #888;
    font-style: italic;
  }

  .badge-duplicado {
    background: #ff4d4d;
    color: white;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
  }

  /* 📱 MODO CELULAR */
  @media (max-width: 768px) {
    .filters {
      grid-template-columns: 1fr;
    }
    
    table {
      display: none;
    }

    .card-item {
      display: block;
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      border-left: 5px solid #007bff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
  }
</style>
</head>

<body>

<div class="container">

<div class="back" onclick="volver()">⬅ Volver al inicio</div>

<h1>👥 Listado de Inscritos</h1>

<div class="card">
  <div class="filters">
    <input type="text" id="buscar" placeholder="🔍 Buscar por correo...">

    <select id="fecha">
      <option value="">Cargando fechas...</option>
    </select>

    <select id="funcion">
      <option value="">Filtrar por cargo</option>
      <option value="Nuevo">Nuevo</option>
      <option value="Hermano Mayor">Hermano Mayor</option>
      <option value="Líder GFM">Líder GFM</option>
      <option value="Maestro">Maestro</option>
      <option value="Supervisor Auxiliar">Supervisor Auxiliar</option>
      <option value="Supervisor General">Supervisor General</option>
      <option value="Coordinador de Conectate">Coordinador de Conectate</option>
      <option value="Coord. Pastoral">Coord. Pastoral</option>
      <option value="Pastor Distrital">Pastor Distrital</option>
      <option value="Otro">Otro</option>
    </select>
  </div>
</div>

<div class="card">

<div id="mensaje" class="mensaje">
  Por favor, ingresa un correo o selecciona un filtro para ver los resultados.
</div>

<div class="table-container">
<table id="tabla-datos" style="display: none;">
<thead>
<tr>
  <th>Fecha Registro</th>
  <th>Correo</th>
  <th>Nombre</th>
  <th>Fecha Aposento</th>
  <th>Cargo / Función</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div id="cards"></div>

</div>

</div>

<script>

const URL = "https://opensheet.elk.sh/1KnqBvdR7gnt2EO22AQbQcYiUYLMBpnFE28XrBPMYBsU/Registro";

let datos = [];

// 🔥 Obtener nombre dinámicamente
function obtenerNombre(d) {
  return d["Nombre Completo"] || d["Nombre Completo "] || d["Nombre completo"] || d["Nombre"] || "-";
}

// 🔥 Obtener cargo dinámicamente (Columna I - Texto Largo)
function obtenerFuncion(d) {
  // Buscamos cualquier llave que empiece con "Función que desarrolla" para evitar errores de espacios
  const llave = Object.keys(d).find(k => k.trim().toLowerCase().startsWith("función que desarrolla"));
  return d[llave] || "-";
}

// 🔥 Convertir fecha para ordenar (Formato: "15 de mayo")
function convertirFecha(texto) {
  if (!texto) return new Date(9999,0,1);
  const meses = {
    "enero":0,"febrero":1,"marzo":2,"abril":3,
    "mayo":4,"junio":5,"julio":6,"agosto":7,
    "septiembre":8,"octubre":9,"noviembre":10,"diciembre":11
  };

  let match = (texto || "").toLowerCase().match(/(\d+)\s+de\s+(\w+)/);
  if (!match) return new Date(9999,0,1);

  return new Date(2026, meses[match[2]], parseInt(match[1]));
}

// 🔥 Inicialización
async function init() {
  try {
    const res = await fetch(URL);
    datos = await res.json();

    // Extraer y limpiar fechas únicas para el select
    let fechas = [...new Set(datos.map(d => d["Seleccione fecha de aposento"]))];
    fechas = fechas
      .filter(f => f && f.trim() !== "")
      .sort((a, b) => convertirFecha(a.trim()) - convertirFecha(b.trim()));

    let select = document.getElementById("fecha");
    select.innerHTML = `<option value="">Filtrar por fecha</option>`;
    fechas.forEach(f => {
      select.innerHTML += `<option value="${f}">${f}</option>`;
    });

    console.log("Datos cargados correctamente");
  } catch (error) {
    console.error("Error cargando datos:", error);
    document.getElementById("mensaje").innerText = "Error al conectar con la base de datos.";
  }
}

// 🔥 Renderizado de resultados
function render() {
  let correoBuscar = document.getElementById("buscar").value.toLowerCase().trim();
  let fechaSeleccionada = document.getElementById("fecha").value;
  let funcionBuscar = document.getElementById("funcion").value.toLowerCase();

  const contenedorTabla = document.getElementById("tabla-datos");
  const tablaBody = document.getElementById("tabla");
  const cardsContainer = document.getElementById("cards");
  const mensaje = document.getElementById("mensaje");

  // Si no hay filtros aplicados, limpiar todo
  if (!correoBuscar && !fechaSeleccionada && !funcionBuscar) {
    mensaje.style.display = "block";
    contenedorTabla.style.display = "none";
    tablaBody.innerHTML = "";
    cardsContainer.innerHTML = "";
    return;
  }

  // Filtrado lógico
  let filtrados = datos.filter(d => {
    let correo = (d["Dirección de correo electrónico"] || "").toLowerCase();
    let funcion = obtenerFuncion(d).toLowerCase();
    let fechaAposento = d["Seleccione fecha de aposento"] || "";

    let cumpleCorreo = !correoBuscar || correo.includes(correoBuscar);
    let cumpleFecha = !fechaSeleccionada || fechaAposento === fechaSeleccionada;
    let cumpleFuncion = !funcionBuscar || funcion.includes(funcionBuscar);

    return cumpleCorreo && cumpleFecha && cumpleFuncion;
  });

  // Mostrar u ocultar mensaje de "No encontrado"
  if (filtrados.length === 0) {
    mensaje.style.display = "block";
    mensaje.innerText = "No se encontraron resultados para los filtros seleccionados.";
    contenedorTabla.style.display = "none";
    cardsContainer.innerHTML = "";
    return;
  }

  mensaje.style.display = "none";
  contenedorTabla.style.display = "table";

  // Identificar duplicados por correo
  let contador = {};
  filtrados.forEach(d => {
    let correo = d["Dirección de correo electrónico"];
    if (correo) contador[correo] = (contador[correo] || 0) + 1;
  });

  // Ordenar por fecha de aposento
  filtrados.sort((a,b) => convertirFecha(a["Seleccione fecha de aposento"]) - convertirFecha(b["Seleccione fecha de aposento"]));

  tablaBody.innerHTML = "";
  cardsContainer.innerHTML = "";

  filtrados.forEach(d => {
    let correo = d["Dirección de correo electrónico"] || "-";
    let nombre = obtenerNombre(d);
    let funcion = obtenerFuncion(d);
    let fechaAposento = d["Seleccione fecha de aposento"] || "-";
    let marcaTemporal = d["Marca temporal"] || "-";
    let esDuplicado = contador[correo] > 1;

    // Fila para tabla (Desktop)
    let fila = document.createElement("tr");
    if (esDuplicado) fila.style.background = "#ffe5e5";
    fila.innerHTML = `
      <td>${marcaTemporal}</td>
      <td>${correo}</td>
      <td>${nombre}</td>
      <td>${fechaAposento}</td>
      <td>${funcion}</td>
    `;
    tablaBody.appendChild(fila);

    // Card para móvil (Mobile)
    cardsContainer.innerHTML += `
      <div class="card-item" style="${esDuplicado ? 'border-left: 5px solid red;' : ''}">
        <b>${nombre}</b> ${esDuplicado ? '<span class="badge-duplicado">DUPLICADO</span>' : ''}<br>
        <small>📧 ${correo}</small><br>
        <small>📅 <b>Aposento:</b> ${fechaAposento}</small><br>
        <small>👤 <b>Cargo:</b> ${funcion}</small><br>
        <small style="color:#999">🕒 Reg: ${marcaTemporal}</small>
      </div>
    `;
  });
}

// 🔥 Eventos de escucha
document.addEventListener("DOMContentLoaded", () => {
  init();
  document.getElementById("buscar").addEventListener("input", render);
  document.getElementById("fecha").addEventListener("change", render);
  document.getElementById("funcion").addEventListener("change", render);
});

function volver() {
  // Ajusta esta URL según tu archivo principal
  window.location.href = "index.html";
}

</script>

</body>
</html>
