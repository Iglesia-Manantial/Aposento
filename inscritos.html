<script>

const URL = "https://opensheet.elk.sh/1KnqBvdR7gnt2EO22AQbQcYiUYLMBpnFE28XrBPMYBsU/Solicitud";

let datos = [];

async function cargarFiltros() {
  const res = await fetch(URL);
  datos = await res.json();

  let sedes = [...new Set(datos.map(d => d["Pastor De Sede O Localidad"]))];

  let select = document.getElementById("sede");
  select.innerHTML = `<option value="">Seleccione una sede</option>`;

  sedes.forEach(s => {
    if (s) select.innerHTML += `<option>${s}</option>`;
  });
}

// 🔥 SOLO se ejecuta cuando el usuario selecciona sede
function activarBusqueda() {

  let sede = document.getElementById("sede").value;

  if (!sede) {
    document.getElementById("tabla").innerHTML = "";
    document.getElementById("total").textContent = 0;
    return;
  }

  render();
}

function render() {

  let sede = document.getElementById("sede").value;
  let fecha = document.getElementById("fecha").value;
  let texto = document.getElementById("buscar").value.toLowerCase();

  let filtrados = datos.filter(d => {

    let cumpleSede = d["Pastor De Sede O Localidad"] === sede;
    let cumpleFecha = !fecha || d["Seleccione fecha de aposento"] === fecha;

    let nombre = (d["Nombre Completo"] || "").toLowerCase();
    let correo = (d["Dirección de correo electrónico"] || "").toLowerCase();

    let cumpleTexto = nombre.includes(texto) || correo.includes(texto);

    return cumpleSede && cumpleFecha && cumpleTexto;
  });

  // duplicados por correo
  let contador = {};
  filtrados.forEach(d => {
    let correo = d["Dirección de correo electrónico"];
    contador[correo] = (contador[correo] || 0) + 1;
  });

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  filtrados.forEach(d => {

    let correo = d["Dirección de correo electrónico"] || "-";

    let esDuplicado = contador[correo] > 1;

    tabla.innerHTML += `
      <tr class="${esDuplicado ? 'duplicate' : ''}">
        <td>${d["Marca temporal"] || "-"}</td>
        <td>${correo}</td>
        <td>${d["Nombre Completo"] || "-"}</td>
        <td>${d["Seleccione fecha de aposento"] || "-"}</td>
        <td>${d["Pastor De Sede O Localidad"] || "-"}</td>
      </tr>
    `;
  });

  document.getElementById("total").textContent = filtrados.length;
}

// eventos
document.getElementById("sede").addEventListener("change", activarBusqueda);
document.getElementById("fecha").addEventListener("change", render);
document.getElementById("buscar").addEventListener("input", render);

cargarFiltros();

</script>
