<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscritos</title>

<link rel="icon" href="data:,">

<style>

body {
  font-family: 'Segoe UI', sans-serif;
  background: #eef2f7;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 15px;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.filters {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  width: 100%;
}

.table-container {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 700px;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  font-size: 14px;
}

th {
  background: #007bff;
  color: white;
}

.card-item {
  display: none;
}

.back {
  cursor: pointer;
  color: #007bff;
  margin-bottom: 10px;
}

.mensaje {
  text-align: center;
  margin-top: 20px;
  color: #666;
}

/* 📱 MODO CELULAR */
@media (max-width: 768px) {

  table {
    display: none;
  }

  .card-item {
    display: block;
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
  }

}

</style>
</head>

<body>

<div class="container">

<div class="back" onclick="volver()">⬅ Volver</div>

<h1>👥 Inscritos</h1>

<div class="card">
  <div class="filters">
    <input type="text" id="buscar" placeholder="Buscar por correo...">
    <select id="fecha"></select>
    <input type="text" id="funcion" placeholder="Buscar por líder o función...">
  </div>
</div>

<div class="card">

<div id="mensaje" class="mensaje">
  Busca por correo, fecha o función
</div>

<div class="table-container">
<table>
<thead>
<tr>
  <th>Fecha Registro</th>
  <th>Correo</th>
  <th>Nombre</th>
  <th>Fecha Aposento</th>
  <th>Función / Líder</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div id="cards"></div>

</div>

</div>

<script>

const URL = "https://opensheet.elk.sh/1KnqBvdR7gnt2EO22AQbQcYiUYLMBpnFE28XrBPMYBsU/Registro";

let datos = [];

// 🔥 nombre
function obtenerNombre(d) {
  return d["Nombre Completo"] || d["Nombre Completo "] || d["Nombre completo"] || "-";
}

// 🔥 función / líder
function obtenerFuncion(d) {
  return d["Función que desarrolla en la visión de grupos de cuidado (Nombre de líder/supervisor respectivo):"] 
      || d["Función que desarrolla en la visión de grupos de cuidado (Nombre de líder/supervisor respectivo):    "] 
      || "-";
}

// 🔥 convertir fecha
function convertirFecha(texto) {
  const meses = {
    "enero":0,"febrero":1,"marzo":2,"abril":3,
    "mayo":4,"junio":5,"julio":6,"agosto":7,
    "septiembre":8,"octubre":9,"noviembre":10,"diciembre":11
  };

  let match = (texto || "").toLowerCase().match(/(\d+)\s+de\s+(\w+)/);
  if (!match) return new Date(9999,0,1);

  return new Date(2026, meses[match[2]], parseInt(match[1]));
}

// 🔥 init
async function init() {
  try {
    const res = await fetch(URL);
    datos = await res.json();

    let fechas = [...new Set(datos.map(d => d["Seleccione fecha de aposento"]))];

    fechas = fechas
      .filter(f => f)
      .sort((a, b) => convertirFecha(a.trim()) - convertirFecha(b.trim()));

    let select = document.getElementById("fecha");
    select.innerHTML = `<option value="">Filtrar por fecha</option>`;

    fechas.forEach(f => {
      select.innerHTML += `<option value="${f}">${f}</option>`;
    });

  } catch (error) {
    console.error("Error:", error);
  }
}

// 🔥 render
function render() {

  let correoBuscar = document.getElementById("buscar").value.toLowerCase();
  let fecha = document.getElementById("fecha").value;
  let funcionBuscar = document.getElementById("funcion").value.toLowerCase();

  if (!correoBuscar && !fecha && !funcionBuscar) {
    document.getElementById("mensaje").style.display = "block";
    document.getElementById("tabla").innerHTML = "";
    document.getElementById("cards").innerHTML = "";
    return;
  }

  document.getElementById("mensaje").style.display = "none";

  let filtrados = datos.filter(d => {

    let correo = (d["Dirección de correo electrónico"] || "").toLowerCase();
    let funcion = obtenerFuncion(d).toLowerCase();

    let cumpleCorreo = !correoBuscar || correo.includes(correoBuscar);
    let cumpleFecha = !fecha || d["Seleccione fecha de aposento"] === fecha;
    let cumpleFuncion = !funcionBuscar || funcion.includes(funcionBuscar);

    return cumpleCorreo && cumpleFecha && cumpleFuncion;
  });

  // 🔥 duplicados
  let contador = {};
  filtrados.forEach(d => {
    let correo = d["Dirección de correo electrónico"];
    if (correo) {
      contador[correo] = (contador[correo] || 0) + 1;
    }
  });

  // 🔥 ordenar SIEMPRE por fecha
  filtrados.sort((a,b) => {
    return convertirFecha(a["Seleccione fecha de aposento"]) - convertirFecha(b["Seleccione fecha de aposento"]);
  });

  const tabla = document.getElementById("tabla");
  const cards = document.getElementById("cards");

  tabla.innerHTML = "";
  cards.innerHTML = "";

  filtrados.forEach(d => {

    let correo = d["Dirección de correo electrónico"] || "-";
    let nombre = obtenerNombre(d);
    let funcion = obtenerFuncion(d);
    let duplicado = contador[correo] > 1;

    tabla.innerHTML += `
      <tr style="${duplicado ? 'background:#ffe5e5' : ''}">
        <td>${d["Marca temporal"] || "-"}</td>
        <td>${correo}</td>
        <td>${nombre}</td>
        <td>${d["Seleccione fecha de aposento"] || "-"}</td>
        <td>${funcion}</td>
      </tr>
    `;

    cards.innerHTML += `
      <div class="card-item" style="${duplicado ? 'border:2px solid red;' : ''}">
        <b>${nombre}</b><br>
        📧 ${correo}<br>
        📅 ${d["Seleccione fecha de aposento"]}<br>
        👤 ${funcion}<br>
        🕒 ${d["Marca temporal"]}
        ${duplicado ? '<br><span style="color:red;">⚠ Duplicado</span>' : ''}
      </div>
    `;
  });

}

// 🔥 eventos
document.addEventListener("DOMContentLoaded", () => {
  init();

  document.getElementById("buscar").addEventListener("input", render);
  document.getElementById("fecha").addEventListener("change", render);
  document.getElementById("funcion").addEventListener("input", render);
});

function volver() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
