<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscritos</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: #eef2f7;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-top: 10px;
    }

    .list {
      margin-top: 15px;
    }

    .item {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    .item:last-child {
      border-bottom: none;
    }

    .badge {
      background: #007bff;
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    .alert {
      background: #fff3cd;
      color: #856404;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      text-align: center;
    }

    .back {
      cursor: pointer;
      color: #007bff;
      margin-bottom: 15px;
      display: inline-block;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="back" onclick="volver()">⬅ Volver</div>

  <h1>👥 Inscritos</h1>

  <div class="card">
    <label>Seleccionar sede</label>
    <select id="sedeSelect">
      <option value="">Todas</option>
    </select>
  </div>

  <div class="card">
    <div style="display:flex; justify-content:space-between;">
      <strong>Lista de personas</strong>
      <span class="badge">Total: <span id="total">0</span></span>
    </div>

    <div id="alertaDuplicados"></div>

    <div class="list" id="lista"></div>
  </div>

</div>

<script>

const URL = "https://opensheet.elk.sh/1KnqBvdR7gnt2EO22AQbQcYiUYLMBpnFE28XrBPMYBsU/Solicitud";

let datos = [];

async function cargarDatos() {
  const res = await fetch(URL);
  datos = await res.json();

  const sedes = [...new Set(datos.map(d => d["Asistencia"]))];

  const select = document.getElementById("sedeSelect");

  sedes.forEach(s => {
    if (s) {
      let option = document.createElement("option");
      option.value = s;
      option.textContent = s;
      select.appendChild(option);
    }
  });

  filtrar();
}

function filtrar() {
  const sede = document.getElementById("sedeSelect").value;

  let filtrados = datos;

  if (sede) {
    filtrados = datos.filter(d => d["Asistencia"] === sede);
  }

  // 🔥 CONTROL DE DUPLICADOS
  let nombres = {};
  let duplicados = 0;
  let unicos = [];

  filtrados.forEach(p => {
    let nombre = (p["Nombre Completo"] || "").trim();

    if (!nombre) return;

    if (nombres[nombre]) {
      duplicados++;
    } else {
      nombres[nombre] = true;
      unicos.push(nombre);
    }
  });

  // 🔹 Mostrar lista
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  unicos.forEach(n => {
    lista.innerHTML += `<div class="item">${n}</div>`;
  });

  // 🔹 Totales
  document.getElementById("total").textContent = unicos.length;

  // 🔹 Alerta duplicados
  const alerta = document.getElementById("alertaDuplicados");

  if (duplicados > 0) {
    alerta.innerHTML = `
      <div class="alert">
        ⚠️ ${duplicados} registros duplicados detectados
      </div>
    `;
  } else {
    alerta.innerHTML = "";
  }
}

document.getElementById("sedeSelect").addEventListener("change", filtrar);

function volver() {
  window.location.href = "index.html";
}

cargarDatos();

</script>

</body>
</html>
