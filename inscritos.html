<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscritos</title>

<link rel="icon" href="data:,">

<style>

body {
  font-family: 'Segoe UI', sans-serif;
  background: #eef2f7;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 15px;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.filters {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  width: 100%;
}

.table-container {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  font-size: 14px;
}

th {
  background: #007bff;
  color: white;
}

.card-item {
  display: none;
}

.back {
  cursor: pointer;
  color: #007bff;
  margin-bottom: 10px;
}

.mensaje {
  text-align: center;
  margin-top: 20px;
  color: #666;
}

/* 📱 MODO CELULAR */
@media (max-width: 768px) {

  table {
    display: none;
  }

  .card-item {
    display: block;
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
  }

}

</style>
</head>

<body>

<div class="container">

<div class="back" onclick="volver()">⬅ Volver</div>

<h1>👥 Inscritos</h1>

<div class="card">
  <div class="filters">
    <input type="text" id="buscar" placeholder="Buscar por correo...">
    <select id="fecha"></select>
  </div>
</div>

<div class="card">

<div id="mensaje" class="mensaje">
  Busca por correo o selecciona una fecha
</div>

<div class="table-container">
<table>
<thead>
<tr>
  <th>Fecha Registro</th>
  <th>Correo</th>
  <th>Nombre</th>
  <th>Fecha Aposento</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div id="cards"></div>

</div>

</div>

<script>

const URL = "https://opensheet.elk.sh/1KnqBvdR7gnt2EO22AQbQcYiUYLMBpnFE28XrBPMYBsU/Registro";

let datos = [];

// 🔥 ordenar fecha
function convertirFecha(texto) {
  const meses = {
    "enero":0,"febrero":1,"marzo":2,"abril":3,
    "mayo":4,"junio":5,"julio":6,"agosto":7,
    "septiembre":8,"octubre":9,"noviembre":10,"diciembre":11
  };

  let match = (texto || "").toLowerCase().match(/(\d+)\s+de\s+(\w+)/);
  if (!match) return new Date(9999,0,1);

  return new Date(2026, meses[match[2]], parseInt(match[1]));
}

// cargar filtros
async function init() {
  const res = await fetch(URL);
  datos = await res.json();

  let fechas = [...new Set(datos.map(d => d["Seleccione fecha de aposento"]))];

  let select = document.getElementById("fecha");
  select.innerHTML = `<option value="">Filtrar por fecha</option>`;

  fechas.forEach(f => {
    if (f) select.innerHTML += `<option>${f}</option>`;
  });
}

function render() {

  let correo = document.getElementById("buscar").value.toLowerCase();
  let fecha = document.getElementById("fecha").value;

  if (!correo && !fecha) {
    document.getElementById("mensaje").style.display = "block";
    document.getElementById("tabla").innerHTML = "";
    document.getElementById("cards").innerHTML = "";
    return;
  }

  document.getElementById("mensaje").style.display = "none";

  let filtrados = datos.filter(d => {

    let c = (d["Dirección de correo electrónico"] || "").toLowerCase();

    let cumpleCorreo = !correo || c.includes(correo);
    let cumpleFecha = !fecha || d["Seleccione fecha de aposento"] === fecha;

    return cumpleCorreo && cumpleFecha;
  });

  // 🔥 ordenar por nombre
  filtrados.sort((a,b) => {
    return (a["Nombre Completo"] || "").localeCompare(b["Nombre Completo"] || "");
  });

  // 🔥 si filtra por fecha → ordenar por fecha
  if (fecha) {
    filtrados.sort((a,b) => {
      return convertirFecha(a["Seleccione fecha de aposento"]) - convertirFecha(b["Seleccione fecha de aposento"]);
    });
  }

  const tabla = document.getElementById("tabla");
  const cards = document.getElementById("cards");

  tabla.innerHTML = "";
  cards.innerHTML = "";

  filtrados.forEach(d => {

    let fila = `
      <tr>
        <td>${d["Marca temporal"] || "-"}</td>
        <td>${d["Dirección de correo electrónico"] || "-"}</td>
        <td>${d["Nombre Completo"] || "-"}</td>
        <td>${d["Seleccione fecha de aposento"] || "-"}</td>
      </tr>
    `;

    tabla.innerHTML += fila;

    // 📱 card
    cards.innerHTML += `
      <div class="card-item">
        <b>${d["Nombre Completo"] || "-"}</b><br>
        📧 ${d["Dirección de correo electrónico"]}<br>
        📅 ${d["Seleccione fecha de aposento"]}<br>
        🕒 ${d["Marca temporal"]}
      </div>
    `;
  });

}

document.addEventListener("DOMContentLoaded", () => {
  init();

  document.getElementById("buscar").addEventListener("input", render);
  document.getElementById("fecha").addEventListener("change", render);
});

function volver() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
