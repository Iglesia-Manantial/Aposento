<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fechas Disponibles</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
      background: #f4f6f9;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      text-align: left;
    }

    th {
      background: #007bff;
      color: white;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }

    .back {
      margin-bottom: 20px;
      display: inline-block;
      cursor: pointer;
      color: #007bff;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="back" onclick="volver()">⬅ Volver</div>

  <h1>📅 Fechas Disponibles</h1>

  <table id="tabla">
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Cupos</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>

// 🔥 ESTA ES TU URL CORRECTA
const URL = "https://opensheet.elk.sh/1KnqBvdR7gnt2EO22AQbQcYiUYLMBpnFE28XrBPMYBsU/Opciones";

async function cargarDatos() {
  try {
    const res = await fetch(URL);
    const data = await res.json();

    const tbody = document.querySelector("#tabla tbody");

    tbody.innerHTML = "";

    data.forEach(item => {
      const fila = `
        <tr>
          <td>${item["Fechas disponibles"] || "-"}</td>
          <td>${item["Cupos"] || "-"}</td>
        </tr>
      `;
      tbody.innerHTML += fila;
    });

  } catch (error) {
    console.error("Error cargando datos:", error);
    alert("Error cargando datos. Verifica permisos del Sheet.");
  }
}

function volver() {
  window.location.href = "index.html";
}

cargarDatos();

</script>

</body>
</html>
