<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fechas Disponibles</title>

<link rel="icon" href="data:,">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #eef2f7;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

.back {
  cursor: pointer;
  color: #007bff;
  margin-bottom: 15px;
  display: inline-block;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.fecha {
  font-weight: bold;
}

.badge {
  padding: 6px 12px;
  border-radius: 20px;
  color: white;
  font-size: 12px;
}

.disponible { background: #28a745; }
.pocos { background: #ffc107; color: black; }
.lleno { background: #dc3545; }

.mensaje {
  text-align: center;
  color: #777;
  margin-top: 20px;
}

</style>
</head>

<body>

<div class="container">

<div class="back" onclick="volver()">⬅ Volver</div>

<h1>📅 Fechas Disponibles</h1>

<div id="lista" class="grid"></div>

<div id="mensaje" class="mensaje">Cargando fechas...</div>

</div>

<script>

const URL = "https://opensheet.elk.sh/1KnqBvdR7gnt2EO22AQbQcYiUYLMBpnFE28XrBPMYBsU/Opciones";

const MAX_CUPOS = 25;

// limpiar datos
function limpiarData(data) {
  return data.filter(item => {
    return item["Fechas disponibles"] && item["Fechas disponibles"].trim() !== "";
  });
}

// convertir fecha para ordenar
function convertirFecha(texto) {
  const meses = {
    "enero":0,"febrero":1,"marzo":2,"abril":3,
    "mayo":4,"junio":5,"julio":6,"agosto":7,
    "septiembre":8,"octubre":9,"noviembre":10,"diciembre":11
  };

  let match = texto.toLowerCase().match(/(\d+)\s+de\s+(\w+)/);
  if (!match) return new Date(9999,0,1);

  let dia = parseInt(match[1]);
  let mes = meses[match[2]] ?? 0;

  return new Date(2026, mes, dia);
}

// estado real
function estadoCupos(usados) {

  let disponibles = MAX_CUPOS - usados;

  if (disponibles <= 2) {
    return {texto: "Últimos cupos", clase: "lleno"};
  }

  if (disponibles <= 8) {
    return {texto: "Pocos cupos", clase: "pocos"};
  }

  return {texto: "Disponible", clase: "disponible"};
}

async function cargarDatos() {
  try {
    const res = await fetch(URL);
    let data = await res.json();

    // 🔥 limpiar
    data = limpiarData(data);

    // 🔥 ordenar
    data.sort((a, b) => {
      return convertirFecha(a["Fechas disponibles"]) - convertirFecha(b["Fechas disponibles"]);
    });

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    data.forEach(item => {

      let fecha = item["Fechas disponibles"];
      let usados = parseInt(item["Cupos"]) || 0;
      let disponibles = MAX_CUPOS - usados;

      let estado = estadoCupos(usados);

      let porcentaje = (usados / MAX_CUPOS) * 100;

      lista.innerHTML += `
        <div class="card">
          <div style="width:100%">
            
            <div class="fecha">${fecha}</div>

            <div style="margin-top:5px;">
              ${disponibles} cupos disponibles de ${MAX_CUPOS}
            </div>

            <div style="margin-top:10px; background:#eee; border-radius:10px;">
              <div style="
                width:${porcentaje}%;
                background:#007bff;
                height:8px;
                border-radius:10px;">
              </div>
            </div>

          </div>

          <div class="badge ${estado.clase}">
            ${estado.texto}
          </div>
        </div>
      `;
    });

    if (data.length === 0) {
      document.getElementById("mensaje").innerText = "No hay fechas disponibles";
    } else {
      document.getElementById("mensaje").style.display = "none";
    }

  } catch (error) {
    console.error(error);
    document.getElementById("mensaje").innerText = "Error cargando datos";
  }
}

function volver() {
  window.location.href = "index.html";
}

cargarDatos();

</script>


</body>
</html>
